name: Build Linux, Windows, Mac App

on:
  workflow_dispatch:          # Allows manual trigger from GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps (if package.json exists)
        shell: bash
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json – skipping npm install"
          fi

      - name: Build frontend (if build script exists)
        shell: bash
        run: |
          if [ -f package.json ] && grep -q '"build"' package.json; then
            npm run build
          else
            echo "No build script – using plain HTML/CSS/JS directly"
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v0.1.0
          releaseName: "Release v0.1.0"
          releaseBody: |
            **Downloads:**
            - Linux: .deb (Debian/Ubuntu), .rpm (Fedora/openSUSE), .AppImage (portable)
            - Windows: .exe installer
            - macOS: .dmg / .app

            **How to install:**
            - .deb: sudo dpkg -i *.deb
            - .rpm: sudo rpm -i *.rpm
            - .AppImage: chmod +x *.AppImage && ./YourApp.AppImage
            - .exe: Double-click the installer
            - .dmg: Open and drag to Applications
          releaseDraft: false
          prerelease: false

      # Create Windows portable EXE
      - name: Create Windows portable exe
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exe = Get-ChildItem "src-tauri\target\release\*.exe" | Where-Object { $_.Name -notlike "*setup.exe" } | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName "app-portable.exe"
          } else {
            Write-Error "No base executable found"
          }

      # Upload portable EXE to release
      - name: Upload Windows portable exe
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tagName: v0.1.0
          files: app-portable.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
